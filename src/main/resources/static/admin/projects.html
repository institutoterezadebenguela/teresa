<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerenciar Projetos - Admin Instituto Teresa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="./js/common.js" defer></script>
    <script src="./js/projects.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow">
        <!-- Navegação padrão igual ao index -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="ml-2 font-bold text-xl text-gray-800">Admin</span>
                    </div>
                    <div class="hidden sm:-my-px sm:ml-6 sm:flex sm:space-x-8">
                        <a href="index.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Dashboard</a>
                        <a href="board.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Diretoria</a>
                        <a href="projects.html" class="border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Projetos</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <button id="logout-btn" class="ml-3 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white shadow px-4 py-5 sm:rounded-lg sm:p-6 mb-8">
                <h2 class="text-lg leading-6 font-medium text-gray-900 mb-4">Gerenciar "Projetos"</h2>
                <div id="alert-message" class="hidden mb-4 rounded-md p-4 transition-all"></div>
                <p class="text-gray-500 mb-6">Lista de projetos cadastrados. Clique para editar o conteúdo.</p>

                <!-- Grid de Projetos -->
                <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <p class="col-span-full">Carregando...</p>
                </div>
            </div>

            <!-- Formulário de Edição Oculto inicialmente -->
            <div id="edit-form-card" class="bg-white shadow px-4 py-5 sm:rounded-lg sm:p-6 hidden">
                <h2 class="text-lg leading-6 font-medium text-gray-900 mb-4">Em edição <span id="current-editing-title" class="text-blue-600"></span></h2>
                
                <form id="project-form" class="space-y-6">
                    <input type="hidden" id="project-id">
                    
                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-3">
                            <label for="code" class="block text-sm font-medium text-gray-700">Code (ID HTML)</label>
                            <input type="text" name="code" id="project-code" class="mt-1 shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                        </div>

                        <div class="sm:col-span-3">
                            <label for="title" class="block text-sm font-medium text-gray-700">Título Público</label>
                            <input type="text" name="title" id="project-title" class="mt-1 shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                        </div>
                        
                        <div class="sm:col-span-6">
                            <label for="subtitle" class="block text-sm font-medium text-gray-700">Subtítulo</label>
                            <input type="text" name="subtitle" id="project-subtitle" class="mt-1 shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                        </div>

                        <div class="sm:col-span-6">
                            <label for="description" class="block text-sm font-medium text-gray-700">Descrição Textual</label>
                            <div class="mt-1">
                                <textarea id="project-description" name="description" rows="4" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border border-gray-300 rounded-md p-2"></textarea>
                            </div>
                        </div>

                        <div class="sm:col-span-6">
                            <label for="impact" class="block text-sm font-medium text-gray-700">Texto de Impacto Cultural</label>
                            <div class="mt-1">
                                <textarea id="project-impact" name="impact" rows="3" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border border-gray-300 rounded-md p-2"></textarea>
                            </div>
                        </div>
                        
                        <div class="sm:col-span-6">
                            <label for="image" class="block text-sm font-medium text-gray-700">Caminho da Imagem</label>
                            <input type="text" name="image" id="project-image" placeholder="assets/imagem1.jpeg" class="mt-1 shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                        </div>
                    </div>

                    <div class="pt-5 border-t border-gray-200 flex justify-end gap-3">
                        <button type="button" onclick="hideEditForm()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Cancelar
                        </button>
                        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
