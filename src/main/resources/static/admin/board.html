<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerenciar Diretoria - Admin Instituto Teresa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="./js/common.js" defer></script>
    <script src="./js/board.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow">
        <!-- Navegação padrão igual ao index -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="ml-2 font-bold text-xl text-gray-800">Admin</span>
                    </div>
                    <div class="hidden sm:-my-px sm:ml-6 sm:flex sm:space-x-8">
                        <a href="index.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Dashboard</a>
                        <a href="board.html" class="border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Diretoria</a>
                        <a href="projects.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Projetos</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <button id="logout-btn" class="ml-3 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white shadow px-4 py-5 sm:rounded-lg sm:p-6">
                <h2 class="text-lg leading-6 font-medium text-gray-900 mb-4">Gerenciar "Nossa Diretoria"</h2>
                <div id="alert-message" class="hidden mb-4 rounded-md p-4"></div>
                <div id="board-container" class="space-y-6">
                    <p class="text-gray-500">Carregando dados...</p>
                </div>
            </div>
        </div>
    </main>

    <template id="board-member-template">
        <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
            <h3 class="text-md font-bold text-gray-800 mb-2 member-role-title">Cargo</h3>
            <form onsubmit="updateMember(event, this)">
                <input type="hidden" name="id" class="member-id">
                <input type="hidden" name="role" class="member-role">
                <div class="flex items-center gap-4">
                    <input type="text" name="name" class="member-name shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border" required>
                    <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Salvar
                    </button>
                </div>
            </form>
        </div>
    </template>
</body>
</html>
